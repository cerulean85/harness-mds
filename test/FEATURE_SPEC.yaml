source: SRS.md
schema_version: "1.0"
features:
  - id: FS-001
    name: 사용자 계정 및 인증
    srs_ids: [SRS-002, SRS-003, SRS-004]
    actors: [비로그인 사용자, 일반 사용자, 관리자, 시스템]
    permission_condition: 비로그인 사용자는 회원가입과 로그인만 수행할 수 있으며 관리자 권한 변경은 관리자만 수행할 수 있다.
    preconditions:
      - 회원가입에 필요한 이메일, 비밀번호, 이름 입력 UI가 제공되어야 한다.
    normal_flow:
      - 사용자가 이메일, 비밀번호, 이름을 입력해 회원가입을 요청한다.
      - 시스템은 필수 정보와 계정 중복 여부를 검증한다.
      - 사용자가 ID/PW를 입력해 로그인을 요청한다.
      - 시스템은 자격 증명을 검증하고 세션을 발급한다.
      - 관리자 권한 변경 발생 시 감사 로그를 기록한다.
    alternative_flow:
      - 이미 가입된 이메일이면 신규 계정 생성을 거부하고 중복 안내를 제공한다.
    exception_flow:
      - 연속 로그인 실패가 기준을 초과하면 계정을 잠그고 재시도 또는 관리자 조치 안내를 제공한다.
    completion_condition: 계정 생성, 로그인 성공, 세션 발급, 감사 로그 기록 중 요청된 동작이 완료된다.

  - id: FS-002
    name: 알람 통지 및 처리 가이드
    srs_ids: [SRS-005, SRS-006, SRS-007, SRS-008]
    actors: [일반 사용자, 관리자, 외부 설비/관제 시스템, 시스템]
    permission_condition: 인증된 사용자는 알람 조회가 가능하며, 관리자만 알람 가이드 관리와 통지 설정을 관리할 수 있다.
    preconditions:
      - 알람 코드, 유형, 심각도, 설비명, 발생시각이 수집되어야 한다.
    normal_flow:
      - 외부 설비 또는 연동 시스템에서 알람이 발생한다.
      - 시스템은 지정 화면 또는 팝업에 알람을 표시한다.
      - 시스템은 알람 코드, 유형, 심각도에 맞는 처리 가이드를 조회한다.
      - 등록된 담당자에게 이메일 또는 SMS로 알람 정보를 통지한다.
      - 사용자는 알람 히스토리를 최신순으로 조회한다.
    alternative_flow:
      - 이메일/SMS 네트워크가 차단된 환경에서는 화면 알림과 관리자 로그로 대체 통지한다.
    exception_flow:
      - 처리 가이드가 없으면 등록된 가이드 없음 메시지를 표시하고 관리자 알림을 생성한다.
    completion_condition: 알람 표시, 가이드 제공 또는 미등록 안내, 통지 결과 로그 기록이 완료된다.

  - id: FS-003
    name: 자연어 설비 제어 명령
    srs_ids: [SRS-009]
    actors: [일반 사용자, 관리자, 외부 관제 시스템]
    permission_condition: 설비 제어 권한을 가진 사용자만 명령 변환과 전송을 수행할 수 있다.
    preconditions:
      - 제어 대상 관제 시스템, 명령 변환 규칙, 위험 명령 판정 기준이 등록되어야 한다.
    normal_flow:
      - 사용자가 자연어로 설비 제어 명령을 입력한다.
      - 시스템은 사용자의 권한을 확인한다.
      - 시스템은 자연어를 제어 명령으로 변환한다.
      - 시스템은 실행 전 사용자 재확인을 요청한다.
      - 사용자가 승인하면 관제 시스템으로 명령을 전송한다.
      - 처리 결과와 전송 이력을 채팅창에 표시한다.
    alternative_flow:
      - 사용자가 재확인 단계에서 취소하면 명령을 전송하지 않고 취소 이력을 남긴다.
    exception_flow:
      - 위험 명령 또는 무권한 명령은 차단하고 차단 사유를 사용자와 관리자 로그에 남긴다.
    completion_condition: 명령 전송 결과 또는 차단/취소 결과가 사용자에게 표시되고 이력이 저장된다.

  - id: FS-004
    name: 근거 기반 질의 응답
    srs_ids: [SRS-010, SRS-011, SRS-012, SRS-017, SRS-018, SRS-019, SRS-031, SRS-032]
    actors: [일반 사용자, 관리자, AI 모델, 시스템]
    permission_condition: 사용자는 본인 권한으로 접근 가능한 데이터 소스에 대해서만 질의할 수 있다.
    preconditions:
      - 문서, 로그, 도메인 지식, 이벤트 DB, VectorDB 등 검색 가능한 데이터 소스가 등록되어야 한다.
    normal_flow:
      - 사용자가 자연어 질의를 입력한다.
      - 시스템은 명시 데이터 소스가 있으면 해당 범위로 검색을 제한한다.
      - 명시 데이터 소스가 없으면 질의 의도와 권한을 기준으로 기본 DB를 자동 선택한다.
      - 시스템은 관련 근거를 검색한다.
      - AI 모델은 검색 결과를 기반으로 구조화된 템플릿에 맞춰 답변을 생성한다.
      - 시스템은 출처, 선택된 DB 목록, 선택 사유, 관련 이미지를 함께 표시한다.
    alternative_flow:
      - 사용자가 이벤트 이력 조회를 요청하면 조건에 맞는 이력을 시간순으로 제공한다.
    exception_flow:
      - 권한 없는 데이터 소스가 지정되면 검색하지 않고 권한 오류를 표시한다.
    completion_condition: 답변, 근거, 출처, 데이터 소스 정보가 사용자에게 제공된다.

  - id: FS-005
    name: 파일 업로드 및 VectorDB 관리
    srs_ids: [SRS-013, SRS-014, SRS-015, SRS-016, SRS-026]
    actors: [일반 사용자, 관리자, 시스템]
    permission_condition: 사용자는 허용된 정책 범위에서 업로드할 수 있으며, 관리자는 파일 제한 정책을 관리할 수 있다.
    preconditions:
      - 허용 확장자, 허용 용량, 저장 경로, VectorDB 목적/별칭 규칙이 정의되어야 한다.
    normal_flow:
      - 사용자가 Drag & Drop 또는 파일 탐색기로 파일을 선택한다.
      - 시스템은 확장자와 용량을 검증한다.
      - 허용 파일을 저장하고 업로드 이력을 기록한다.
      - 시스템은 업로드 파일의 내용과 메타데이터를 추출해 벡터화한다.
      - 사용자는 목적별 VectorDB를 생성하고 별칭으로 관리한다.
      - 벡터와 메타데이터는 이후 모델 답변에 활용된다.
    alternative_flow:
      - 사용자가 기존 목적별 VectorDB를 선택하면 해당 DB에 벡터 데이터를 저장한다.
    exception_flow:
      - 파일 정책에 의해 차단된 업로드, 다운로드, 삭제 요청은 거부하고 사유를 표시한다.
    completion_condition: 파일 저장, 이력 기록, 벡터 저장 또는 정책 차단 결과가 완료된다.

  - id: FS-006
    name: 음성 입출력
    srs_ids: [SRS-020, SRS-021, SRS-022, SRS-023]
    actors: [일반 사용자, STT/TTS 엔진, 시스템]
    permission_condition: 인증된 사용자는 음성 질의와 음성 답변 기능을 사용할 수 있다.
    preconditions:
      - 마이크 사용 권한, 핫워드 또는 버튼 트리거, STT/TTS 엔진 설정이 준비되어야 한다.
    normal_flow:
      - 사용자가 핫워드 또는 버튼 클릭으로 음성 입력을 시작한다.
      - 시스템은 STT 모듈을 활성화하고 음성을 텍스트로 변환한다.
      - 변환된 텍스트를 질의 입력창에 표시하고 AI 질의 흐름으로 전달한다.
      - AI 답변이 생성되면 TTS 엔진으로 음성 변환 후 재생한다.
      - 특정 발화가 웹 사이트 열람 명령에 매핑된 경우 브라우저로 해당 사이트를 연다.
    alternative_flow:
      - STT/TTS 엔진은 클라우드 또는 온디바이스 방식 중 설정된 방식으로 동작한다.
    exception_flow:
      - 마이크 권한이 없거나 STT 변환에 실패하면 오류 메시지를 표시하고 텍스트 입력 대체를 제공한다.
    completion_condition: 음성 질의가 텍스트 질의로 전달되거나 답변 음성이 재생된다.

  - id: FS-007
    name: 관리자 페이지
    srs_ids: [SRS-024, SRS-025, SRS-027]
    actors: [관리자, 시스템]
    permission_condition: 관리자만 관리자 페이지에 접근할 수 있다.
    preconditions:
      - 관리자 역할이 계정에 부여되어야 하며 주요 이벤트 로그가 저장되어야 한다.
    normal_flow:
      - 관리자가 관리자 페이지에 접근한다.
      - 시스템은 관리자 권한을 검증한다.
      - 관리자는 사용자 정보와 각종 이력을 조회한다.
      - 관리자는 일반 사용자의 서비스 이용을 제한할 수 있다.
      - 관리자는 AI 모델 버전을 등록, 조회, 변경한다.
      - 관리자는 주요 로그를 조건별로 검색/필터링한다.
    alternative_flow:
      - 모델 버전 변경 시 호환성 확인 결과가 제공되면 관리자는 변경을 취소할 수 있다.
    exception_flow:
      - 일반 사용자가 관리자 페이지에 접근하면 접근을 거부하고 보안 로그를 남긴다.
    completion_condition: 관리자 작업 결과가 적용되고 필요한 감사 로그가 저장된다.

  - id: FS-008
    name: 통계 분석 및 리포팅
    srs_ids: [SRS-028, SRS-029, SRS-030]
    actors: [일반 사용자, 관리자, 시스템]
    permission_condition: 사용자는 접근 권한이 있는 설비 DB와 분석 결과만 조회하거나 내보낼 수 있다.
    preconditions:
      - 설비 DB, MES, 공정/설비 데이터 연결 정보와 조회 권한이 등록되어야 한다.
    normal_flow:
      - 사용자가 기간, 변수, 조건을 지정하거나 자연어로 분석을 요청한다.
      - 시스템은 관련 DB에서 조건에 맞는 데이터를 조회한다.
      - 시스템은 통계값을 산출한다.
      - 사용자가 요구하면 차트 또는 표 형태로 결과를 가공한다.
      - 사용자는 대화, 답변, 근거, 분석 결과를 PDF/CSV 등으로 내보낸다.
    alternative_flow:
      - 그래프 제공이 적절하지 않은 결과는 표 또는 텍스트 요약으로 제공한다.
    exception_flow:
      - DB 연결 실패 또는 권한 없는 데이터 요청 시 오류 메시지를 표시하고 결과 생성을 중단한다.
    completion_condition: 분석 결과가 표시되거나 파일 내보내기가 완료된다.

  - id: FS-009
    name: 답변 피드백 및 질의 이력
    srs_ids: [SRS-033, SRS-034]
    actors: [일반 사용자, 시스템]
    permission_condition: 사용자는 본인의 답변 피드백과 질의 이력만 생성, 조회, 삭제할 수 있다.
    preconditions:
      - 답변 ID, 사용자 식별자, 질의/응답 이력 저장소가 있어야 한다.
    normal_flow:
      - 답변 카드에 좋아요/싫어요 버튼을 표시한다.
      - 사용자가 피드백 버튼을 클릭한다.
      - 시스템은 사용자 식별자, 답변 ID, 피드백 값을 저장한다.
      - 사용자는 기간 또는 키워드로 과거 질의 이력을 조회한다.
      - 사용자는 질의 또는 응답 이력을 개별/다중 선택해 삭제한다.
    alternative_flow:
      - 사용자가 삭제한 이력은 소프트 삭제 플래그로 사용자 화면에서 숨긴다.
    exception_flow:
      - 이미 삭제된 이력에 대한 삭제 요청은 변경 없이 완료 상태를 반환한다.
    completion_condition: 피드백 저장 또는 이력 조회/소프트 삭제가 완료된다.

  - id: FS-010
    name: 운영 기능
    srs_ids: [SRS-001, SRS-035, SRS-036, SRS-037, SRS-038, SRS-039]
    actors: [관리자, 시스템/배치]
    permission_condition: 운영 설정과 백업, 모델 교체는 관리자 승인 또는 시스템 배치 권한으로 수행된다.
    preconditions:
      - 성능 기준, 백업 대상, 설치 패키지, 모델 전환 설정, 배포 전략이 정의되어야 한다.
    normal_flow:
      - 시스템은 최대 5명 동시 접속 상태에서 텍스트 질의 p95 10초 이내 응답 기준을 만족해야 한다.
      - 텍스트 질의는 10초 이내, 음성 질의는 20초 이내 응답을 목표로 한다.
      - 60초를 초과한 응답은 오류 메시지 반환 후 종료한다.
      - 시스템은 데이터 자산을 일일/월간 정책에 따라 백업한다.
      - 운영 중인 모델을 새 버전으로 교체할 때 서비스 중단을 방지한다.
      - 온프레미스 설치와 외부 모델/API 전환 또는 병행 사용이 가능해야 한다.
    alternative_flow:
      - 외부 모델/API 사용이 불가하면 설정된 내부 모델 또는 온디바이스 방식으로 전환한다.
    exception_flow:
      - 백업 실패 또는 모델 교체 실패 시 관리자에게 알리고 실패 로그를 저장한다.
    completion_condition: 성능 기준, 백업 정책, 모델 교체 연속성, 설치/전환 요구가 검증 가능 상태가 된다.

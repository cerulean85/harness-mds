resolved_issues:
  - kind: "번호 중복"
    status: "해결"
    resolution: "No를 1부터 39까지 재부여하여 중복 제거"
  - kind: "번호 누락"
    status: "해결"
    resolution: "No 25 누락을 포함해 전체 번호를 연속 체계로 재정렬"
  - kind: "검증 기준 모호"
    status: "해결"
    resolution: "동시 사용자 5명, 95번째 백분위 10초 이내, 시험 조건 기록 기준 추가"
  - kind: "필수 메타데이터 누락"
    status: "해결"
    resolution: "알람 발생 및 히스토리 조회의 유형=기능, 중요도=M으로 보완"
  - kind: "문구/오탈자"
    status: "해결"
    resolution: "원인과, 있어야 한다, 기능은, 배포 전략 표현으로 수정"
  - kind: "보존 기간 충돌"
    status: "해결"
    resolution: "업로드 이력 보존 기간을 최소 12개월 이상으로 통일"
  - kind: "안전 제어 누락"
    status: "해결"
    resolution: "자연어 설비 제어 명령에 실행 전 재확인, 취소, 위험 명령 차단 기준 추가"
  - kind: "ID 체계 불일치"
    status: "해결"
    resolution: "SRS ID를 SRS-### 단일 체계로 정리하고 기존 ID는 추적 컬럼에 보존"
  - kind: "중복 가능성"
    status: "해결"
    resolution: "DB 자동 선택과 명시적 데이터 소스 범위 제한으로 역할 분리"
  - kind: "정책 모호"
    status: "해결"
    resolution: "메일/SMS 불가 시 화면 알림과 관리자 로그로 대체하는 정책 추가"
  - kind: "보안 기준 보완"
    status: "해결"
    resolution: "인증 및 세션 보안 정책 신규 요구사항 추가"
